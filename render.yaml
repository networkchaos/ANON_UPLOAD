services:
  - type: web
    name: anon-upload-api
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      # Add these manually in Render dashboard (never commit real values):
      # SUPABASE_URL
      # SUPABASE_SERVICE_KEY
      # ENCRYPTION_KEY
      # JWT_SECRET
      # ADMIN_PASSWORD_HASH
      # FRONTEND_URL
      # RATE_LIMIT_WINDOW_MS
      # RATE_LIMIT_MAX
